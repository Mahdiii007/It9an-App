# Deploy static content to GitHub Pages
name: Deploy to GitHub Pages

env:
  # Bis alle Actions auf Node 24 laufen: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass neue Pushes laufende Deployments abbrechen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Gleiches Secret wie Deploy-Firebase-Workflow (Firestore appSettings/forceLogout)
      - name: Google Cloud anmelden (Firestore forceLogout)
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Alle Nutzer ausloggen (forceLogout++)
        run: |
          set -euo pipefail
          cd functions
          npm ci
          node tools/bump-force-logout-on-deploy.js

      # Kein beweglicher Tag „v6“ im Marketplace — exakte Version nutzen (Node 24)
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0

      # Repo-Wurzel = ausgelieferte Website (GitHub Pages)
      - name: Bump app-version.json (automatisch bei jedem Deploy)
        run: |
          chmod +x scripts/bump-app-version.sh
          bash scripts/bump-app-version.sh
          test -s app-version.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
