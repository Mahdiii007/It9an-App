# Deploy static content to GitHub Pages
name: Deploy to GitHub Pages

env:
  # Bis alle Actions auf Node 24 laufen: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass neue Pushes laufende Deployments abbrechen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Repo-Wurzel = ausgelieferte Website (GitHub Pages)
      - name: Write deploy version (PWA lädt Updates ohne Neuinstallation)
        run: |
          printf '%s\n' "{\"version\":\"gh-${GITHUB_SHA}\",\"builtAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > app-version.json
          test -s app-version.json
          echo "app-version.json:" && cat app-version.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
