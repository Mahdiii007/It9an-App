# Firebase: Functions + Firestore + Storage (ohne Hosting, falls die App auf GitHub Pages liegt).
# Secret anlegen: FIREBASE_TOKEN = Ausgabe von: firebase login:ci
# Für Hosting mit Firebase zusätzlich FIREBASE_ONLY leer lassen und unten deploy-Ziel anpassen.
name: Deploy Firebase

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI (Major 13, weniger firepit-Probleme)
        run: npm install -g firebase-tools@13

      - name: Deploy functions + firestore
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Secret oft mit Zeilenende aus Editor → „Bearer … is not a legal HTTP header value“
          TOKEN="$(printf '%s' "${FIREBASE_TOKEN}" | tr -d '\r\n')"
          if [ -z "${TOKEN}" ]; then
            echo "::error::Secret FIREBASE_TOKEN ist leer. Anlegen: GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "Wert lokal erzeugen: firebase login:ci"
            exit 1
          fi
          firebase deploy --only functions,firestore --project it9an-neu --non-interactive --token "${TOKEN}"

      - name: Deploy storage rules (optional)
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          TOKEN="$(printf '%s' "${FIREBASE_TOKEN}" | tr -d '\r\n')"
          firebase deploy --only storage --project it9an-neu --non-interactive --token "${TOKEN}"
