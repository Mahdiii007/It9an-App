# Firebase: Functions + Firestore + Storage (ohne Hosting, falls die App auf GitHub Pages liegt).
# Secret anlegen: FIREBASE_TOKEN = Ausgabe von: firebase login:ci
# Für Hosting mit Firebase zusätzlich FIREBASE_ONLY leer lassen und unten deploy-Ziel anpassen.
name: Deploy Firebase

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Cache FFmpeg (Linux-Binary für transcodeUploadAudio)
        uses: actions/cache@v4
        with:
          path: functions/bin/ffmpeg-linux
          key: ffmpeg-linux-amd64-johnvansickle-v1

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy (functions, firestore, storage)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only functions,firestore,storage --project it9an-neu --non-interactive
