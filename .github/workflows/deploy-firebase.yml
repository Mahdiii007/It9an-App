# Firebase: Functions + Firestore (+ Storage optional)
#
# Pflicht in GitHub (ohne das schlägt der Workflow sofort fehl — FIREBASE_TOKEN reicht für Rules nicht):
#   Secret FIREBASE_SERVICE_ACCOUNT_KEY = kompletter Inhalt der JSON-Datei
#   Firebase Console → Projekteinstellungen → Dienstkonten → „Neuen privaten Schlüssel“
#   GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret
#
# Hinweis: FIREBASE_TOKEN / firebase login:ci liefert bei firebaserules.googleapis.com oft HTTP 401.
#
# IAM (ohne das schlägt „firebase deploy“ für Functions fehl):
#   Dem Dienstkonto aus FIREBASE_SERVICE_ACCOUNT_KEY (client_email in der JSON) muss in GCP die Rolle
#   „Dienstkontonutzer“ / „Service Account User“ (roles/iam.serviceAccountUser) zugewiesen werden,
#   damit es iam.serviceAccounts.actAs für it9an-neu@appspot.gserviceaccount.com ausführen darf.
#   Console: https://console.cloud.google.com/iam-admin/iam?project=it9an-neu
#   → Dienstkonto auswählen → „Zugriff gewähren“ / IAM → Rolle „Service Account User“ (projektweit).
#
# IAM bei HTTP 403 auf firebaserules.googleapis.com („caller does not have permission“):
#   Demselben Dienstkonto (client_email) zusätzlich eine Rules-/Firebase-Rolle geben, z. B.:
#   • „Firebase Rules Administrator“ / Firebase Rules Admin — roles/firebaserules.admin
#   • oder „Firebase Administrator“ — roles/firebase.admin (breiter, umfasst Rules + mehr)
#   Console: https://console.cloud.google.com/iam-admin/iam?project=it9an-neu
#
# IAM bei HTTP 403 auf serviceusage.googleapis.com / runtimeconfig.googleapis.com:
#   Die CLI prüft u. a. „Runtime Config API“. Ohne Leserecht auf Service Usage: 403.
#   Dem Dienstkonto mindestens „Service Usage Viewer“ — roles/serviceusage.serviceUsageViewer
#   (oder breiter: „Service Usage Admin“ — roles/serviceusage.serviceUsageAdmin, falls APIs aktiviert werden sollen).
#   API einmal aktivieren: https://console.cloud.google.com/apis/library/runtimeconfig.googleapis.com?project=it9an-neu
#
# HTTP 403 cloudbilling.googleapis.com („Cloud Billing API has not been used or is disabled“):
#   Im selben GCP-Projekt die „Cloud Billing API“ aktivieren (einmalig, ggf. einige Minuten warten):
#   https://console.cloud.google.com/apis/library/cloudbilling.googleapis.com?project=it9an-neu
#   Zusätzlich braucht das Deploy-Dienstkonto oft Leserechte auf Abrechnung, z. B. „Rechnungskonten-Viewer“
#   / Billing Account Viewer auf das verknüpfte Rechnungskonto, oder breiter „Projekt“-Rolle mit Billing-Zugriff.
#
# „Unhandled error cleaning up build images“ / firebase Exit 2 nach Deploy:
#   scripts/deploy-firebase.sh wertet Exit 2 als Erfolg, wenn „Deploy complete“ im Log steht (FIREBASE_STRICT_EXIT=1 deaktiviert das).
#   Die Warnung betrifft oft nur das Löschen alter Cloud-Build-Images (Artifact Registry / gcf).
#   Wenn im Log trotzdem „Deploy complete!“ steht, sind Functions meist live — sonst Actions-Log prüfen (erste Zeile mit „Error:“).
#   IAM (optional, für sauberes Aufräumen): Dem Dienstkonto aus FIREBASE_SERVICE_ACCOUNT_KEY zusätzlich z. B.
#   „Artifact Registry Administrator“ — roles/artifactregistry.admin (projektweit oder auf die Region eu).
#
# „Failed to upsert schedule function …“ (pubsub.schedule / 1st Gen, z. B. sendQuranReminderScheduled*, europe-west3):
#   Scheduled Functions legen Cloud-Scheduler-Jobs an. Ohne API oder IAM schlägt der Deploy fehl.
#   • API aktivieren: https://console.cloud.google.com/apis/library/cloudscheduler.googleapis.com?project=it9an-neu
#   • (Pub/Sub ist meist schon an; bei Bedarf: cloud.googleapis.com/apis/library/pubsub.googleapis.com)
#   • Dem Deploy-Dienstkonto (FIREBASE_SERVICE_ACCOUNT_KEY / client_email) zusätzlich z. B.:
#     „Cloud Scheduler Administrator“ — roles/cloudscheduler.admin
#     oder breiter „Firebase Administrator“ / „Editor“ (roles/firebase.admin bzw. roles/editor).
#
name: Deploy Firebase

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "scripts/deploy-firebase.sh"
      - "scripts/functions-npm-ci.sh"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - ".github/workflows/deploy-firebase.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Ohne dieses Secret: sofort abbrechen (kein sinnloser Deploy-Versuch mit Token)
      - name: Firebase-Dienstkonto prüfen
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          SA_TRIM="$(printf '%s' "${FIREBASE_SERVICE_ACCOUNT_KEY:-}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$SA_TRIM" ]; then
            echo "::error title=FIREBASE_SERVICE_ACCOUNT_KEY fehlt::In GitHub unter Settings → Secrets → Actions anlegen (komplette JSON vom Firebase-Dienstkonto)."
            echo "::error::FIREBASE_TOKEN führt bei Firestore/Firebase Rules zu 401 — nur Dienstkonto-JSON wird unterstützt."
            exit 1
          fi
          printf '%s' "$SA_TRIM" > "${RUNNER_TEMP}/firebase-sa-validate.json"
          node -e "
            const fs = require('fs');
            const p = process.argv[1];
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (!j.private_key || !j.client_email) {
              console.error('JSON braucht client_email und private_key.');
              process.exit(1);
            }
          " "${RUNNER_TEMP}/firebase-sa-validate.json"

      # v3 nutzt Node 24 (v2 noch node20 → Deprecation-Warnung auf den Runnern)
      - name: Google Cloud anmelden (ADC für Firebase CLI)
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI (Major 13, weniger firepit-Probleme)
        run: npm install -g firebase-tools@13

      - name: Deploy functions + firestore
        run: |
          set -euo pipefail
          export USE_SYSTEM_FIREBASE=1
          export FIREBASE_ONLY=functions,firestore
          bash scripts/deploy-firebase.sh

      - name: Deploy storage rules (optional)
        continue-on-error: true
        env:
          SKIP_FUNCTIONS_NPM_CI: "1"
        run: |
          set -euo pipefail
          export USE_SYSTEM_FIREBASE=1
          export FIREBASE_ONLY=storage
          bash scripts/deploy-firebase.sh
