# Firebase: Functions + Firestore (+ Storage optional)
#
# Authentifizierung (empfohlen):
#   Secret FIREBASE_SERVICE_ACCOUNT_KEY = vollständiger Inhalt der JSON-Datei
#   (Firebase Console → Projekteinstellungen → Dienstkonten → „Neuen privaten Schlüssel“)
#   → GitHub: Repo → Settings → Secrets → Actions → New repository secret
#
# Fallback (oft 401 nach Ablauf):
#   FIREBASE_TOKEN = Ausgabe von firebase login:ci  (von firebase-tools als veraltet markiert)
#
name: Deploy Firebase

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI (Major 13, weniger firepit-Probleme)
        run: npm install -g firebase-tools@13

      - name: Prepare Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${FIREBASE_SERVICE_ACCOUNT_KEY:-}" ]; then
            printf '%s' "$FIREBASE_SERVICE_ACCOUNT_KEY" > "${RUNNER_TEMP}/firebase-ci-sa.json"
            echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-ci-sa.json" >> "$GITHUB_ENV"
            echo "firebase_auth_mode=sa" >> "$GITHUB_ENV"
            echo "Nutze Dienstkonto (GOOGLE_APPLICATION_CREDENTIALS)."
          else
            T="$(printf '%s' "${FIREBASE_TOKEN:-}" | tr -d '\r\n')"
            if [ -z "$T" ]; then
              echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_KEY (JSON) oder FIREBASE_TOKEN setzen. 401 = Token abgelaufen oder ungültig — Dienstkonto bevorzugen."
              exit 1
            fi
            echo "firebase_auth_mode=token" >> "$GITHUB_ENV"
            echo "FIREBASE_CI_TOKEN=$T" >> "$GITHUB_ENV"
            echo "::warning::FIREBASE_TOKEN-Fallback; langfristig FIREBASE_SERVICE_ACCOUNT_KEY nutzen (siehe Workflow-Kopf)."
          fi

      - name: Deploy functions + firestore
        run: |
          set -euo pipefail
          if [ "${firebase_auth_mode:-}" = "sa" ]; then
            firebase deploy --only functions,firestore --project it9an-neu --non-interactive
          else
            firebase deploy --only functions,firestore --project it9an-neu --non-interactive --token "${FIREBASE_CI_TOKEN}"
          fi

      - name: Deploy storage rules (optional)
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ "${firebase_auth_mode:-}" = "sa" ]; then
            firebase deploy --only storage --project it9an-neu --non-interactive
          else
            firebase deploy --only storage --project it9an-neu --non-interactive --token "${FIREBASE_CI_TOKEN}"
          fi
