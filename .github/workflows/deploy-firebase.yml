# Firebase: Functions + Firestore (+ Storage optional)
#
# Pflicht in GitHub (ohne das schlägt der Workflow sofort fehl — FIREBASE_TOKEN reicht für Rules nicht):
#   Secret FIREBASE_SERVICE_ACCOUNT_KEY = kompletter Inhalt der JSON-Datei
#   Firebase Console → Projekteinstellungen → Dienstkonten → „Neuen privaten Schlüssel“
#   GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret
#
# Hinweis: FIREBASE_TOKEN / firebase login:ci liefert bei firebaserules.googleapis.com oft HTTP 401.
#
name: Deploy Firebase

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "functions/**"
      - "scripts/deploy-firebase.sh"
      - "scripts/functions-npm-ci.sh"
      - "firebase.json"
      - ".firebaserc"
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - ".github/workflows/deploy-firebase.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Ohne dieses Secret: sofort abbrechen (kein sinnloser Deploy-Versuch mit Token)
      - name: Firebase-Dienstkonto prüfen
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          SA_TRIM="$(printf '%s' "${FIREBASE_SERVICE_ACCOUNT_KEY:-}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$SA_TRIM" ]; then
            echo "::error title=FIREBASE_SERVICE_ACCOUNT_KEY fehlt::In GitHub unter Settings → Secrets → Actions anlegen (komplette JSON vom Firebase-Dienstkonto)."
            echo "::error::FIREBASE_TOKEN führt bei Firestore/Firebase Rules zu 401 — nur Dienstkonto-JSON wird unterstützt."
            exit 1
          fi
          printf '%s' "$SA_TRIM" > "${RUNNER_TEMP}/firebase-sa-validate.json"
          node -e "
            const fs = require('fs');
            const p = process.argv[1];
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (!j.private_key || !j.client_email) {
              console.error('JSON braucht client_email und private_key.');
              process.exit(1);
            }
          " "${RUNNER_TEMP}/firebase-sa-validate.json"

      - name: Google Cloud anmelden (ADC für Firebase CLI)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI (Major 13, weniger firepit-Probleme)
        run: npm install -g firebase-tools@13

      - name: Deploy functions + firestore
        run: |
          set -euo pipefail
          export USE_SYSTEM_FIREBASE=1
          export FIREBASE_ONLY=functions,firestore
          bash scripts/deploy-firebase.sh

      - name: Deploy storage rules (optional)
        continue-on-error: true
        env:
          SKIP_FUNCTIONS_NPM_CI: "1"
        run: |
          set -euo pipefail
          export USE_SYSTEM_FIREBASE=1
          export FIREBASE_ONLY=storage
          bash scripts/deploy-firebase.sh
